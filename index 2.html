*,*::before,*::after { box-sizing: border-box; }

body { background: #04080e; }
.japp { min-height: 100vh; min-height: 100dvh; }
@keyframes jbreathe { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
@keyframes jflicker { 0%,100%{opacity:1;} 92%{opacity:1;} 94%{opacity:.45;} 96%{opacity:1;} }
@keyframes jscan { from { transform: translateY(-100%);} to { transform: translateY(900%);} }
@keyframes jfade { from { opacity: 0; } to { opacity: 1; } }
@keyframes holoscroll { from { background-position: 0 0; } to { background-position: 0 120px; } }
@keyframes holoflicker { 0%,100%{opacity:.45} 50%{opacity:.7} 91%{opacity:.35} 93%{opacity:.65} 95%{opacity:.4} }
@keyframes wakepulse { 0%,100%{box-shadow:0 0 0 0 rgba(56,225,255,0.5);} 50%{box-shadow:0 0 0 5px rgba(56,225,255,0);} }
.jrow::-webkit-scrollbar { width: 6px; }
.jrow::-webkit-scrollbar-thumb { background: ${Ce.cyanDim}; border-radius: 3px; }
.jinput::placeholder { color: ${Ce.muted}; }
.jinput:focus { outline: none; }
.holo-scan { position:absolute; inset:0; pointer-events:none; border-radius:14px; overflow:hidden; background: repeating-linear-gradient(to bottom, rgba(56,225,255,0.08) 0px, rgba(56,225,255,0.08) 1px, transparent 2px, transparent 5px); mix-blend-mode: screen; animation: holoflicker 4.5s infinite, holoscroll 9s linear infinite; }
.holo-cone { position:absolute; left:50%; bottom:-4%; width:78%; height:66%; transform:translateX(-50%); pointer-events:none; background: linear-gradient(to top, rgba(56,225,255,0.22), rgba(56,225,255,0) 78%); clip-path: polygon(45% 100%, 55% 100%, 100% 0, 0 0); filter: blur(5px); }
.holo-base { position:absolute; left:50%; bottom:0%; width:58%; height:11%; transform:translateX(-50%); pointer-events:none; background: radial-gradient(ellipse at center, rgba(56,225,255,0.55), rgba(56,225,255,0) 70%); filter: blur(3px); }
.holo-baseline { position:absolute; left:50%; bottom:5%; width:42%; height:2px; transform:translateX(-50%); pointer-events:none; background: linear-gradient(90deg, transparent, ${Ce.cyan}, transparent); box-shadow:0 0 12px ${Ce.cyan}; }
.holo-glow { position:absolute; left:50%; top:46%; width:62%; height:62%; transform:translate(-50%,-50%); pointer-events:none; border-radius:50%; background: radial-gradient(circle, rgba(56,225,255,0.16), rgba(56,225,255,0) 68%); filter: blur(6px); }
